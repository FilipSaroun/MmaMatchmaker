# Název aplikace
spring.application.name=mma-matchmaker

# Databáze (H2 in-memory)
# Přidán parametr DB_CLOSE_DELAY, aby databáze nezmizela dřív, než se načtou data
spring.datasource.url=jdbc:h2:mem:mmadb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true

# Hibernate nastavení
# ZMĚNA: create-drop vynutí smazání a nové vytvoření tabulek (nutné pro správné načtení data.sql)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Zobrazí SQL v konzoli, abys viděl, jestli se data opravdu vkládají
spring.jpa.show-sql=true

# Inicializace dat z data.sql
# always: Vždy spustí data.sql
spring.sql.init.mode=always
# true: Počká, až Hibernate vytvoří tabulky, a pak teprve pustí data.sql
spring.jpa.defer-datasource-initialization=true

# Logování
logging.level.cz.vspojekt.mmamatchmaker=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Swagger UI cesta
springdoc.swagger-ui.path=/swagger-ui.html

# Security - vypnutí nutnosti hesla pro vývoj (pokud tam máš Spring Security)
spring.security.user.name=admin
spring.security.user.password=admin