<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMA ULTIMATE MATCHMAKER | SELECT SCREEN</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #bc13fe;
            --neon-red: #ff003c;
            --main-bg: #050505;
        }

        body {
            background: var(--main-bg);
            color: white;
            font-family: 'Oswald', sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            transition: background 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        header {
            padding: 15px 40px;
            background: rgba(0,0,0,0.9);
            border-bottom: 2px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            position: relative;
        }

        h1 {
            font-family: 'Bebas Neue', cursive;
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 4px;
        }

        .main-container {
            display: flex;
            height: calc(100vh - 180px);
            padding: 0 60px;
            align-items: center;
            position: relative;
            justify-content: space-between;
        }

        .fighter-display {
            width: 400px;
            z-index: 20;
            animation: fadeIn 0.5s ease-out;
            position: relative;
        }

        .rank-tag {
            padding: 5px 20px;
            font-weight: bold;
            font-size: 1.2rem;
            display: inline-block;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transform: skew(-15deg);
        }

        .fighter-name {
            font-family: 'Bebas Neue', cursive;
            font-size: 5rem;
            line-height: 0.85;
            margin: 10px 0;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 40px;
        }

        .stat-item {
            border-left: 4px solid white;
            padding-left: 15px;
            transition: border-color 0.5s ease;
        }

        .stat-value { font-size: 3rem; font-weight: 700; display: block; line-height: 1; }
        .stat-label { font-size: 0.8rem; color: #888; text-transform: uppercase; }

        .actions {
            margin-top: 50px;
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 15px 35px;
            font-family: 'Bebas Neue';
            font-size: 1.4rem;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary { background: white; color: black; z-index: 10001; }
        .btn-outline { background: transparent; border: 2px solid white; color: white; }
        .btn:hover { transform: scale(1.1) translateY(-3px); }

        .image-viewport {
            position: absolute;
            top: 0;
            left: 460px;
            width: calc(100% - 460px);
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            pointer-events: none;
            z-index: 10;
        }

        #mainImage {
            height: 98%;
            object-fit: contain;
            transition: 0.6s all cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .character-select {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            overflow-x: auto;
            padding: 15px 10px;
            gap: 12px;
            border-top: 3px solid #222;
            z-index: 1000;
        }

        .char-box {
            min-width: 120px;
            height: 70px;
            background: #151515;
            border: 2px solid #333;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.8rem;
            text-align: center;
            transition: 0.3s;
            text-transform: uppercase;
            padding: 5px;
            flex-shrink: 0;
            color: #666;
        }

        .char-box.active {
            background: #222;
            color: white;
            transform: translateY(-5px);
        }

   /* --- FINÁLNÍ OPRAVA FACE-OFF OVERLAY --- */
    .match-overlay {
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        background: radial-gradient(circle, #0a0a0a 0%, #000 100%);
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    .face-off-container {
        display: flex;
        width: 100%;
        height: 100%;
        align-items: flex-end;
        position: relative;
    }

    .fighter-column {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: flex-end;
        height: 100%;
    }

    .match-img {
        height: 98%; /* BOJOVNÍCI JSOU VĚTŠÍ */
        object-fit: contain;
        z-index: 1;
    }

    .match-info {
        position: absolute;
        top: 45%; /* JMÉNA NA HRUDI */
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 10;
        width: 100%;
        pointer-events: none;
    }

    .match-info h2 {
        font-family: 'Bebas Neue';
        font-size: 7rem;
        margin: 0;
        display: flex;
        justify-content: space-around;
        padding: 0 5%;
        letter-spacing: 2px;
    }

    /* ČISTÉ TEXTOVÉ VS MÍSTO KRUHU */
   .vs-text {
    position: absolute;
    top: 75%; /* Tímto posuneš VS níže (původně bylo 60%) */
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11rem;
    font-style: italic;
    color: #ff003c;
    text-shadow: 0 0 30px rgba(255, 0, 60, 0.5);
    z-index: 10006;
    cursor: pointer;
    user-select: none;
    transition: transform 0.2s ease;
}
    .vs-text:hover {
        transform: translate(-50%, -50%) scale(1.1);
        filter: brightness(1.2);
    }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

<header>
    <h1>MMA <span id="dynamicTitle">RANKING</span> SYSTEM</h1>
    <div id="clock" style="font-family: monospace; color: #555;">SYSTEM READY</div>
</header>

<div class="main-container">
    <div class="fighter-display" id="fighterDisplay"></div>
    <div class="image-viewport">
        <img id="mainImage" src="" alt="">
    </div>
</div>

<div class="character-select" id="charSelect"></div>

<script>
    let fighters = [];
    const colors = ['#bc13fe', '#ff003c', '#00d2ff', '#39ff14', '#feff00', '#ff6700', '#ff00ff', '#00ffcc', '#ff4500', '#1e90ff', '#adff2f', '#ff1493'];
    
    let isFantasyMode = false;
    let player1 = null;

    const fighterImages = {
        "Jon Jones": "https://www.ufc.com/images/styles/athlete_bio_full_body/s3/2025-10/JONES_JON_L.png?itok=kmU0yeOm",
        "Tom Aspinall": "https://www.ufc.com/images/styles/athlete_bio_full_body/s3/2025-10/ASPINALL_TOM_L_BELT_10-25.png?itok=IZOURXpq",
        "Ciryl Gane": "https://www.ufc.com/images/styles/athlete_bio_full_body/s3/2025-01/5/GANE_CIRYL_L_12-07.png?itok=c2iotGcJ",
        "Sergei Pavlovich": "https://dmxg5wxfqgb4u.cloudfront.net/styles/athlete_bio_full_body/s3/2023-04/PAVLOVICH_SERGEI_L_04-22.png",
        "Curtis Blaydes": "https://www.ufc.com/images/styles/athlete_bio_full_body/s3/2026-04/BLAYDES_CURTIS_L_04-11.png?itok=S2vAPlYW",
        "Alex Pereira": "https://www.ufc.com/images/styles/athlete_bio_full_body/s3/2025-03/PEREIRA_ALEX_L.png?itok=NGa-mFn3",
        "Jiri Prochazka": "https://www.ufc.com/images/styles/athlete_bio_full_body/s3/2026-04/PROCHAZKA_JIRI_L_04-11.png?itok=kBRmW3X3",
        "Magomed Ankalaev": "https://dmxg5wxfqgb4u.cloudfront.net/styles/athlete_bio_full_body/s3/2024-01/ANKALAEV_MAGOMED_L_01-13.png",
        "Jamahal Hill": "https://www.ufc.com/images/styles/athlete_bio_full_body/s3/2025-06/HILL_JAMAHAL_L_06-21.png?itok=1zikeY7L",
        "Jan Blachowicz": "https://www.ufc.com/images/styles/athlete_bio_full_body/s3/2025-12/BLACHOWICZ_JAN_L_12-06.png?itok=Eebxksxs",
        "Dricus Du Plessis": "https://www.ufc.com/images/styles/athlete_bio_full_body/s3/2025-08/DU_PLESSIS_DRICUS_L_01-20.png?itok=he12FNwZ",
        "Sean Strickland": "https://www.ufc.com/images/styles/athlete_bio_full_body/s3/2024-01/STRICKLAND_SEAN_L_BELT_01-20.png?itok=Cw7q3OTS",
        "Israel Adesanya": "https://www.ufc.com/images/styles/athlete_bio_full_body/s3/2026-03/ADESANYA_ISRAEL_L_03-28.png?itok=k94VqJkp",
        "Robert Whittaker": "https://dmxg5wxfqgb4u.cloudfront.net/styles/athlete_bio_full_body/s3/2024-02/WHITTAKER_ROBERT_L_02-17.png",
        "Khamzat Chimaev": "https://www.ufc.com/images/styles/athlete_bio_full_body/s3/2025-05/CHIMAEV_KHAMZAT_L_10-26.png?itok=splBiOD2",
        "Leon Edwards": "https://www.ufc.com/images/styles/athlete_bio_full_body/s3/2025-11/EDWARDS_LEON_L_11-15.png?itok=2iqnAJ-n",
        "Kamaru Usman": "https://dmxg5wxfqgb4u.cloudfront.net/styles/athlete_bio_full_body/s3/2023-10/USMAN_KAMARU_L_10-21.png",
        "Belal Muhammad": "https://www.ufc.com/images/styles/athlete_bio_full_body/s3/2025-11/MUHAMMAD_BELAL_L_11-22.png?itok=GbDd-Wfz",
        "Shavkat Rakhmonov": "https://dmxg5wxfqgb4u.cloudfront.net/styles/athlete_bio_full_body/s3/2023-12/RAKHMONOV_SHAVKAT_L_12-16.png",
        "Gilbert Burns": "https://www.ufc.com/images/styles/athlete_bio_full_body/s3/2026-04/BURNS_GILBERT_L_04-18.png?itok=BQs_76RS",
        "Islam Makhachev": "https://www.ufc.com/images/styles/athlete_bio_full_body/s3/2025-01/7/MAKHACHEV_ISLAM_L_BELT_01-18.png?itok=PMvc--o_",
        "Charles Oliveira": "https://dmxg5wxfqgb4u.cloudfront.net/styles/athlete_bio_full_body/s3/2024-04/OLIVEIRA_CHARLES_L_04-13.png",
        "Arman Tsarukyan": "https://www.ufc.com/images/styles/athlete_bio_full_body/s3/2025-11/TSARUKYAN_ARMAN_L_11-22.png?itok=jcjRljpE",
        "Justin Gaethje": "https://www.ufc.com/images/styles/athlete_bio_full_body/s3/2026-01/GAETHJE_JUSTIN_L_BELTMOCK.png?itok=utSvr1mp",
        "Dustin Poirier": "https://dmxg5wxfqgb4u.cloudfront.net/styles/athlete_bio_full_body/s3/2024-03/POIRIER_DUSTIN_L_03-09.png",
        "Conor McGregor": "https://dmxg5wxfqgb4u.cloudfront.net/styles/athlete_bio_full_body/s3/2021-07/MCGREGOR_CONOR_L_07-10.png",
        "Michael Chandler": "https://www.ufc.com/images/styles/athlete_bio_full_body/s3/2025-04/CHANDLER_MICHAEL_L_04-12.png?itok=ZHu1WFu9",
        "Ilia Topuria": "https://www.ufc.com/images/styles/athlete_bio_full_body/s3/2024-10/TOPURIA_ILIA_L_BELT_10-26.png?itok=OV_qjldr",
        "Alexander Volkanovski": "https://dmxg5wxfqgb4u.cloudfront.net/styles/athlete_bio_full_body/s3/2024-02/VOLKANOVSKI_ALEXANDER_L_02-17.png",
        "Max Holloway": "https://dmxg5wxfqgb4u.cloudfront.net/styles/athlete_bio_full_body/s3/2024-04/HOLLOWAY_MAX_L_04-13.png",
        "Brian Ortega": "https://dmxg5wxfqgb4u.cloudfront.net/styles/athlete_bio_full_body/s3/2024-02/ORTEGA_BRIAN_L_02-24.png",
        "Yair Rodriguez": "https://www.ufc.com/images/styles/athlete_bio_full_body/s3/2025-04/RODRIGUEZ_YAIR_L_04-12.png?itok=AbuJzLhI",
        "Sean O Malley": "https://www.ufc.com/images/styles/athlete_bio_full_body/s3/2026-01/OMALLEY_SEAN_L_01-24.png?itok=-ZLFZWi5",
        "Merab Dvalishvili": "https://dmxg5wxfqgb4u.cloudfront.net/styles/athlete_bio_full_body/s3/2024-02/DVALISHVILI_MERAB_L_02-17.png",
        "Cory Sandhagen": "https://dmxg5wxfqgb4u.cloudfront.net/styles/athlete_bio_full_body/s3/2023-08/SANDHAGEN_CORY_L_08-05.png",
        "Petr Yan": "https://dmxg5wxfqgb4u.cloudfront.net/styles/athlete_bio_full_body/s3/2024-03/YAN_PETR_L_03-09.png",
        "Alexandre Pantoja": "https://www.ufc.com/images/styles/athlete_bio_full_body/s3/2025-12/PANTOJA_ALEXANDRE_L_07-08.png?itok=uEs-mTKx",
        "Brandon Royval": "https://www.ufc.com/images/styles/athlete_bio_full_body/s3/2025-12/ROYVAL_BRANDON_L_12-13.png?itok=ubbl7aE4",
        "Brandon Moreno": "https://www.ufc.com/images/styles/athlete_bio_full_body/s3/2026-02/MORENO_BRANDON_L_02-28.png?itok=8Fe1y-Fs",
        "Amir Albazi": "https://dmxg5wxfqgb4u.cloudfront.net/styles/athlete_bio_full_body/s3/2023-06/ALBAZI_AMIR_L_06-03.png"
    };

    async function loadFighters() {
        try {
            const response = await fetch('/api/fighters');
            fighters = await response.json();
            if (fighters && fighters.length > 0) {
                renderFighter(0);
                renderSelector();
            }
        } catch (e) { console.error("Backend error", e); }
    }

    function renderFighter(index) {
        if (isFantasyMode) return; 

        const f = fighters[index];
        const display = document.getElementById('fighterDisplay');
        const img = document.getElementById('mainImage');
        const activeColor = colors[index % colors.length];
        
        // --- TADY JE TA KLÍČOVÁ OPRAVA PROTI NULÁM ---
        // JavaScript si teď vezme čistá čísla z backendu. 
        // Pokud by náhodou v JSONu byla malá/velká písmena jinak, má tam i zálohy.
        const wins = f.wins !== undefined ? f.wins : (f.vyhry !== undefined ? f.vyhry : 0);
        const losses = f.losses !== undefined ? f.losses : (f.prohry !== undefined ? f.prohry : 0);
        // ---------------------------------------------

        const ranking = f.ranking === 0 ? 'CHAMPION' : f.ranking;
        const weight = (f.weightClass || 'UNKNOWN').toUpperCase();
        const imgUrl = fighterImages[f.name] || "https://www.ufc.com/themes/custom/ufc/assets/img/no-profile-image.png";

        display.style.opacity = 0;
        setTimeout(() => {
            document.body.style.background = `radial-gradient(circle at 75% 40%, ${activeColor}22 0%, #050505 65%)`;
            document.getElementById('dynamicTitle').style.color = activeColor;
            document.getElementById('dynamicTitle').style.textShadow = `0 0 15px ${activeColor}`;

            display.innerHTML = `
                <div class="rank-tag" style="background: ${activeColor}; box-shadow: 0 0 20px ${activeColor}66">RANK #${ranking}</div>
                <p style="color: white; opacity: 0.5; margin: 0; letter-spacing: 3px; font-weight: 300;">${weight} DIVISION</p>
                <h2 class="fighter-name" style="text-shadow: 4px 4px 0px ${activeColor}44">${f.name}</h2>
                <div class="stats-grid">
                    <div class="stat-item" style="border-color: ${activeColor}"><span class="stat-value">${wins}</span><span class="stat-label">Wins</span></div>
                    <div class="stat-item" style="border-color: ${activeColor}"><span class="stat-value">${losses}</span><span class="stat-label">Losses</span></div>
                    <div class="stat-item" style="border-color: ${activeColor}"><span class="stat-value">${Math.floor(85 + Math.random() * 14)}%</span><span class="stat-label">Win Prob.</span></div>
                </div>
                <div class="actions">
                    <button class="btn btn-primary" onclick="autoMatch(${index})">Auto Match</button>
                    <button class="btn btn-outline" style="border-color: ${activeColor}" onclick="fantasyMatch(${index})">Fantasy Fight</button>
                </div>
            `;
            img.src = imgUrl;
            img.style.filter = `drop-shadow(0 0 40px ${activeColor}55)`;
            display.style.opacity = 1;
        }, 200);
    }

    function renderSelector() {
        const select = document.getElementById('charSelect');
        select.innerHTML = fighters.map((f, i) => `
            <div class="char-box" id="char-${i}" onclick="setActive(${i})">
                ${f.name ? f.name.split(' ').pop() : 'FIGHTER'}
            </div>
        `).join('');
        setActive(0);
    }

    function setActive(idx) {
        if (isFantasyMode && player1) {
            const player2 = fighters[idx];
            if (player1 === player2) return alert("Can't fight yourself!");
            showMatch(player1, player2);
            isFantasyMode = false;
            player1 = null;
            renderFighter(idx);
            return;
        }

        document.querySelectorAll('.char-box').forEach(b => b.classList.remove('active'));
        const activeBox = document.getElementById(`char-${idx}`);
        if(activeBox) activeBox.classList.add('active');
        renderFighter(idx);
    }

  function autoMatch(idx) {
    const p1 = fighters[idx];
    // OPRAVA: Vyfiltruje pouze bojovníky, kteří mají STEJNOU váhu a nejsou to oni sami
    const opponents = fighters.filter(f => f.id !== p1.id && f.weightClass === p1.weightClass);
    
    if (opponents.length === 0) {
        alert("No other fighters in this division!");
        return;
    }
    
    const randomOpponent = opponents[Math.floor(Math.random() * opponents.length)];
    showMatch(p1, randomOpponent);
}

    function fantasyMatch(idx) {
        isFantasyMode = true;
        player1 = fighters[idx];
        const display = document.getElementById('fighterDisplay');
        display.innerHTML = `
            <div class="rank-tag" style="background: white; color: black;">FANTASY MODE</div>
            <h2 class="fighter-name" style="font-size: 3rem;">SELECT OPPONENT FOR</h2>
            <h2 class="fighter-name" style="color: ${colors[idx % colors.length]}">${player1.name}</h2>
            <div class="actions"><button class="btn btn-outline" onclick="location.reload()">CANCEL</button></div>
        `;
    }

    function showMatch(p1, p2) {
        const img1 = fighterImages[p1.name] || "";
        const img2 = fighterImages[p2.name] || "";

        const overlay = document.createElement('div');
        overlay.className = 'match-overlay';
        overlay.innerHTML = `
            <div class="vs-text" onclick="this.closest('.match-overlay').remove()">VS</div>
            <div class="match-info">
                <h2>
                    <span style="color: var(--neon-purple); text-shadow: 0 0 30px rgba(188, 19, 254, 0.6);">${p1.name}</span>
                    <span style="color: var(--neon-red); text-shadow: 0 0 30px rgba(255, 0, 60, 0.6);">${p2.name}</span>
                </h2>
            </div>
            <div class="face-off-container">
                <div class="fighter-column">
                    <img src="${img1}" class="match-img" style="transform: scaleX(1)">
                </div>
                <div class="fighter-column">
                    <img src="${img2}" class="match-img" style="transform: scaleX(-1)">
                </div>
            </div>
        `;
        document.body.appendChild(overlay);
    }

    window.onload = loadFighters;
</script>
</body>
</html>
